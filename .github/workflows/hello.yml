name: Hello-GitAction

on: push

jobs:
    greet:
         runs-on: ubuntu-latest
         steps:
            - name: Say hello to user
              run: echo " Hello Ravi"

            - name: Say good by to evey one
              run: uptime

            - name: checking current working 
              run: pwd
            - name: Checking current usser created in server
              run: cat /etc/passwd
            - uses: actions/checkout@v4
              run: ls -la
    details:
         runs-on: ubuntu-latest
         steps:
             - name: version of docker and python
               run: docker --version && python --version
